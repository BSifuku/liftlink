<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Email Verification</title>

    <style>
        body {
           margin: 0;
           padding: 0;
           background: #f4f6f9;
           font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
                  background: #ffffff;
                  border-radius: 10px;
                  overflow: hidden;
                  box-shadow: 0 2px 10px rgba(0,0,0,.1);
              }

              .header {
                  background: #1976d2;
                  color: white;
                  text-align: center;
                  padding: 25px;
              }

              .header h1 {
                  margin: 0;
              }

              .content {
                  padding: 35px;
                  color: #333;
              }

              .verification-code {
                  margin: 30px auto;
                  width: fit-content;
                  background: #f5f5f5;
                  border: 2px dashed #1976d2;
                  padding: 15px 35px;
                  font-size: 32px;
                  font-weight: bold;
                  letter-spacing: 8px;
                  color: #1976d2;
                  border-radius: 8px;
              }

              .footer {
                  text-align: center;
                  padding: 20px;
                  font-size: 13px;
                  color: #777;
                  background: #fafafa;
              }

              p {
                  line-height: 1.6;
              }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>LiftLink</h1>
        </div>

        <div class="content">
            <h2>Hello <span th:text="${fullName}">User</span>,</h2>

            <p>
                Thank you for registering with <strong>LiftLink</strong>
            </p>

            <div class="verification-code" th:text="${verificationCode}">
                123456
            </div>
            <div class="activation-link">
                <a th:href="${confirmationUrl}" target="_blank">Activate your account</a>
            </div>

            <p>
                If you did not create an account, you can safely ignore this email.
            </p>

            <p>
                Regards,<br>
                <strong>LiftLink Team</strong>
            </p>
        </div>

        <div class="footer">
            &copy; 2026 LiftLink. All rights reserved.
        </div>
    </div>
</body>
</html>
